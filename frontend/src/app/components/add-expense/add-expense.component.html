<div class="add-expense-container">
  <div class="form-card">
    <h1>{{ isEditMode ? 'Edit Expense' : 'Add New Expense' }}</h1>

    <form [formGroup]="expenseForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label for="description">Description *</label>
        <input type="text" class="form-control" id="description" formControlName="description" />
        <div *ngIf="submitted && f['description'].errors" class="error-text">
          <span *ngIf="f['description'].errors['required']">Description is required</span>
          <span *ngIf="f['description'].errors['minlength']">Description must be at least 3 characters</span>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="amount">Amount (INR) *</label>
          <input type="number" class="form-control" id="amount" formControlName="amount" step="0.01" />
          <div *ngIf="submitted && f['amount'].errors" class="error-text">
            <span *ngIf="f['amount'].errors['required']">Amount is required</span>
            <span *ngIf="f['amount'].errors['min']">Amount must be greater than 0</span>
          </div>
        </div>

        <div class="form-group">
          <label for="categoryId">Category *</label>
          <select class="form-control" id="categoryId" formControlName="categoryId">
            <option value="">Select a category</option>
            <option *ngFor="let cat of categories" [value]="cat.id">{{ cat.name }}</option>
          </select>
          <div *ngIf="submitted && f['categoryId'].errors" class="error-text">
            <span *ngIf="f['categoryId'].errors['required']">Category is required</span>
          </div>
        </div>
        <div class="form-group">
        <label>Receipt</label>
          <input
            type="file"
            class="form-control"
            (change)="onReceiptSelected($event)">
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="expenseDate">Date *</label>
          <input type="date" class="form-control" id="expenseDate" formControlName="expenseDate" />
          <div *ngIf="submitted && f['expenseDate'].errors" class="error-text">
            <span *ngIf="f['expenseDate'].errors['required']">Date is required</span>
          </div>
        </div>

        <div class="form-group">
          <label for="status">Status *</label>
          <select class="form-control" id="status" formControlName="status">
            <option value="PENDING">Pending</option>
            <option value="PAID">Paid</option>
          </select>
        </div>
      </div>

      <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
      <div *ngIf="success" class="alert alert-success">{{ success }}</div>

      <div class="form-actions">
        <button type="submit" class="btn btn-success" [disabled]="loading">
          <span *ngIf="loading">Saving...</span>
          <span *ngIf="!loading">{{ isEditMode ? 'Update Expense' : 'Add Expense' }}</span>
        </button>
        <button type="button" class="btn btn-secondary" (click)="cancel()">Cancel</button>
      </div>
    </form>
  </div>
</div>
